<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>LearnFeed</title>
<meta name="description" content="A personal short-form feed of real educational TikToks." />
<style>
  :root{--bg:#000;--fg:#fff;--muted:#a1a1aa;--accent:#ff2d55;--card:#18181b;--border:#27272a;--good:#34c759}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overscroll-behavior:none}
  button{font:inherit;cursor:pointer}
  a{color:inherit}
  #app{height:100dvh;width:100%;max-width:480px;margin:0 auto;position:relative;background:#000;overflow:hidden}
  .feed{height:100dvh;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
  .feed::-webkit-scrollbar{display:none}
  .slide{height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;position:relative;display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden}
  .slide .cover{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.55)}
  .embed{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}
  .tapplay{position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:#fff;background:rgba(0,0,0,.25)}
  .tapplay .play{width:64px;height:64px;border-radius:999px;background:rgba(255,255,255,.16);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;font-size:26px}
  .overlay{position:absolute;left:0;right:0;bottom:52px;padding:16px 16px 12px;background:linear-gradient(transparent,rgba(0,0,0,.82));z-index:2;pointer-events:none}
  .topic{display:inline-block;font-size:12px;color:var(--accent);font-weight:800;text-transform:uppercase;letter-spacing:.04em}
  .title{margin:6px 0 4px;font-size:15px;line-height:1.35;font-weight:600;max-height:4.2em;overflow:hidden}
  .author{font-size:12px;color:var(--muted)}
  .likes{font-size:12px;color:#fff;font-weight:700;margin-top:4px}
  .likes span{color:var(--accent)}
  .sound{position:absolute;top:56px;right:14px;z-index:6;width:44px;height:44px;border-radius:999px;border:none;background:rgba(0,0,0,.6);color:#fff;font-size:19px;display:flex;align-items:center;justify-content:center}
  .soundhint{position:absolute;top:108px;right:14px;z-index:6;background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:600;padding:6px 10px;border-radius:8px}
  .badge{position:absolute;top:14px;left:14px;z-index:3;font-size:11px;font-weight:800;padding:3px 8px;border-radius:999px;background:rgba(0,0,0,.55);text-transform:uppercase}
  .topbar{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;gap:8px;padding:10px 12px}
  .search{flex:1;background:rgba(0,0,0,.6);border:1px solid var(--border);color:#fff;border-radius:999px;padding:9px 14px;font-size:14px;outline:none}
  .iconbtn{background:rgba(0,0,0,.6);border:1px solid var(--border);color:#fff;border-radius:999px;width:40px;height:40px;font-size:18px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .center{height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:28px}
  .center h2{margin:0;font-size:20px}
  .center p{color:var(--muted);margin:0;max-width:300px}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-weight:700;font-size:15px}
  .btn.sec{background:var(--card);border:1px solid var(--border)}
  .sheet{position:absolute;inset:0;z-index:20;background:#0a0a0b;overflow-y:auto;transform:translateX(100%);transition:transform .2s ease}
  .sheet.open{transform:none}
  .page{padding:18px 16px 60px}
  .page h1{font-size:22px;margin:6px 0 18px}
  .sec{margin-bottom:26px}
  .sec h3{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 10px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
  .row small{color:var(--muted);font-size:12px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{padding:9px 13px;border-radius:999px;border:1px solid var(--border);background:var(--card);font-size:14px;color:#fff}
  .inline{display:flex;gap:8px;margin-top:8px}
  .inline input{flex:1;background:var(--card);border:1px solid var(--border);color:#fff;border-radius:10px;padding:10px 12px;outline:none}
  .toggle{width:46px;height:26px;border-radius:999px;background:#3f3f46;border:none;position:relative;flex:0 0 auto}
  .toggle.on{background:var(--good)}
  .toggle::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:999px;background:#fff;transition:transform .15s}
  .toggle.on::after{transform:translateX(20px)}
  .muted{color:var(--muted);font-size:13px}
  .quizwrap{position:absolute;inset:0;z-index:40;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;padding:20px}
  .quiz{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;width:100%}
  .quiz h3{margin:0 0 14px;font-size:17px;line-height:1.4}
  .qc{display:block;width:100%;text-align:left;padding:13px;border-radius:10px;border:1px solid var(--border);background:#0f0f11;color:#fff;margin-bottom:8px;font-size:14px}
  .qc.correct{border-color:var(--good);background:rgba(52,199,89,.15)}
  .qc.wrong{border-color:var(--accent);background:rgba(255,45,85,.15)}
</style>
</head>
<body>
<div id="app"><div class="center"><p class="muted">Loading real TikToks…</p></div></div>

<script>
/* ============================================================
   LearnFeed — static live site (GitHub Pages).
   Real TikTok videos, pre-scraped per interest into feed.json by the same
   unofficial TikTok scraper the full Next.js app uses (scripts/build_feed.py).
   GitHub Pages is static so it can't scrape at request time — re-run the
   scraper + redeploy to refresh. Personalization/search/settings are client
   side (localStorage). Full app w/ live scraper + YouTube fallback in the repo.
   ============================================================ */

const DEFAULTS=["psychology","science","tech","self-improvement","history"];
const QUIZ={ // demo quiz bank (real app generates with Gemini). OFF by default.
  psychology:{q:"'Reading' someone from tiny behaviors is unreliable because…",a:["behavior is noisy and context-dependent","people never lie","body language is a language","psychologists say so"],c:0},
  science:{q:"Good science communication should mostly…",a:["state facts without evidence","explain the reasoning and evidence","use complex jargon","avoid numbers"],c:1},
};

/* ---------- state ---------- */
const KEY="learnfeed.v2";
const load=()=>{try{return JSON.parse(localStorage.getItem(KEY))||{}}catch{return{}}};
const save=()=>localStorage.setItem(KEY,JSON.stringify(state));
let state=load();
if(!state.interests){
  state.interests=DEFAULTS.map(n=>({name:n,active:true,priority:1}));
  state.watched={};state.skipped={};state.streaks={};state.tagCounts={};
  state.rank=1000;state.quizEnabled=false;state.muted=true;save();
}

/* ---------- audio ----------
   Browsers block autoplay WITH sound for cross-origin iframes until the user
   interacts with the page once. So: autoplay muted, then on the first tap we
   flip soundOn and drive the TikTok player/v1 embed API over postMessage
   (unMute/play). After that, scrolling swaps audio to the in-view video. */
let soundOn=false;
function ttCmd(iframe,type,value){
  if(!iframe||!iframe.contentWindow)return;
  const m={type,"x-tiktok-player":true};if(value!==undefined)m.value=value;
  try{iframe.contentWindow.postMessage(m,"*")}catch(e){}
  try{iframe.contentWindow.postMessage(JSON.stringify(m),"*")}catch(e){}
}
// player takes a moment to be ready; retry the unmute a few times
function pushAudio(el){
  const f=el&&el.querySelector("iframe.embed");if(!f)return;
  [200,700,1500,2600].forEach(t=>setTimeout(()=>{
    if(el!==activeEl)return;
    if(soundOn){ttCmd(f,"unMute");ttCmd(f,"setVolume",1);ttCmd(f,"play")}else{ttCmd(f,"mute")}
  },t));
}
function silence(el){const f=el&&el.querySelector("iframe.embed");if(f){ttCmd(f,"mute");ttCmd(f,"pause")}}
function enableSound(){
  if(soundOn)return;soundOn=true;
  document.querySelectorAll(".soundhint").forEach(h=>h.remove());
  document.querySelectorAll(".sound").forEach(b=>b.textContent="🔊");
  pushAudio(activeEl);
}
window.addEventListener("pointerdown",enableSound,{once:true});

/* ---------- data ---------- */
let FEED={};          // topic -> [videos]
let ALL=[];           // flat list
function videosFor(t){return FEED[t.toLowerCase()]||FEED[t]||[]}
function tier(r){return r>=800?"Diamond":r>=600?"Platinum":r>=400?"Gold":r>=200?"Silver":"Bronze"}
function adjust(name,d){const it=state.interests.find(i=>i.name===name);if(it)it.priority=Math.max(.1,Math.min(3,it.priority+d))}

// weighted round-robin across active interests, hide watched/skipped
function buildFeed(){
  const active=state.interests.filter(i=>i.active);
  const pools=active.map(it=>({it,rows:videosFor(it.name).filter(v=>!state.watched[v.id]&&!state.skipped[v.id]),idx:0})).filter(p=>p.rows.length);
  if(!pools.length)return[];
  const credits=pools.map(()=>0),out=[];
  while(out.length<80){
    let any=false;
    pools.forEach((p,i)=>{if(p.idx<p.rows.length){credits[i]+=p.it.priority;any=true}});
    if(!any)break;
    let pick=-1;
    pools.forEach((p,i)=>{if(p.idx<p.rows.length&&(pick<0||credits[i]>credits[pick]))pick=i});
    if(pick<0)break;
    credits[pick]-=1;out.push(pools[pick].rows[pools[pick].idx]);pools[pick].idx++;
  }
  return out;
}

/* ---------- personalization ---------- */
function report(v,secs,ended){
  const dur=v.duration||30;
  const full=ended||secs>=Math.min(dur*0.6,10);
  if(full){
    state.watched[v.id]=1;adjust(v.topic,.15);state.streaks[v.topic]=0;
    (v.tags||[]).concat([v.topic]).forEach(t=>{t=(t||"").toLowerCase();if(t)state.tagCounts[t]=(state.tagCounts[t]||0)+1});
  }else if(secs<3){
    state.skipped[v.id]=1;
    state.streaks[v.topic]=(state.streaks[v.topic]||0)+1;
    if(state.streaks[v.topic]>=3){adjust(v.topic,-.5);state.streaks[v.topic]=0}else adjust(v.topic,-.05);
  }
  save();
}

/* ---------- render ---------- */
const app=document.getElementById("app");
let feedList=[],searchMode=false,quizState=null,searchQuery="",searchT=null;

function render(){
  const list=searchMode?feedList:buildFeed();
  app.innerHTML="";
  app.appendChild(topbar());
  if(!list.length){app.appendChild(emptyState());app.appendChild(settingsSheet());return}
  const feedEl=document.createElement("div");feedEl.className="feed";
  list.forEach(v=>feedEl.appendChild(slide(v)));
  app.appendChild(feedEl);
  app.appendChild(settingsSheet());
  if(quizState)app.appendChild(quizModal());
  observe(feedEl);
}

function topbar(){
  const bar=document.createElement("div");bar.className="topbar";
  const s=document.createElement("input");s.className="search";s.placeholder="Search these videos…";s.value=searchQuery;
  s.oninput=e=>{searchQuery=e.target.value;clearTimeout(searchT);searchT=setTimeout(runSearch,350)};
  bar.appendChild(s);
  if(searchMode){const x=document.createElement("button");x.className="iconbtn";x.textContent="✕";x.onclick=()=>{searchMode=false;searchQuery="";render()};bar.appendChild(x)}
  const g=document.createElement("button");g.className="iconbtn";g.textContent="⚙";
  g.onclick=()=>document.querySelector(".sheet").classList.add("open");
  bar.appendChild(g);return bar;
}
function runSearch(){
  const q=searchQuery.trim().toLowerCase();
  if(q.length<3){if(searchMode&&q.length===0){searchMode=false;render()}return}
  feedList=ALL.filter(v=>(v.title+" "+v.topic+" "+(v.tags||[]).join(" ")).toLowerCase().includes(q));
  if(!feedList.length)feedList=ALL.slice(0,12);
  searchMode=true;render();
}

// Lazily mount the real TikTok embed iframe; show cover art until then.
function slide(v){
  const el=document.createElement("div");el.className="slide";el.dataset.id=v.id;
  el._v=v;el._t0=null;el._watch=0;el._reported=false;el._loaded=false;
  if(v.cover){const c=document.createElement("div");c.className="cover";c.style.backgroundImage=`url(${v.cover})`;el.appendChild(c)}
  const badge=document.createElement("span");badge.className="badge";badge.textContent="tiktok";el.appendChild(badge);
  const tap=document.createElement("div");tap.className="tapplay";
  tap.innerHTML=`<div class="play">▶</div><div class="muted" style="color:#fff">Tap to play</div>`;
  tap.onclick=()=>{mount(el,v);enableSound()};
  el.appendChild(tap);
  // sound toggle (also serves as the "first gesture" to unlock audio)
  const sb=document.createElement("button");sb.className="sound";sb.textContent=soundOn?"🔊":"🔇";
  sb.onclick=(e)=>{e.stopPropagation();soundOn=!soundOn;document.querySelectorAll(".sound").forEach(b=>b.textContent=soundOn?"🔊":"🔇");document.querySelectorAll(".soundhint").forEach(h=>h.remove());if(soundOn)pushAudio(activeEl);else silence(activeEl)};
  el.appendChild(sb);
  if(!soundOn){const hint=document.createElement("div");hint.className="soundhint";hint.textContent="tap for sound";el.appendChild(hint)}
  const ov=document.createElement("div");ov.className="overlay";
  const likes=v.likes?`<div class="likes"><span>♥</span> ${fmt(v.likes)} likes</div>`:"";
  ov.innerHTML=`<span class="topic">${v.topic}</span><p class="title">${esc(v.title)}</p><div class="author">@${esc(v.author||"")}</div>${likes}`;
  el.appendChild(ov);
  return el;
}
function fmt(n){return n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?(n/1e3).toFixed(1)+"K":""+n}
function mount(el,v){
  if(el._loaded)return;el._loaded=true;
  const tap=el.querySelector(".tapplay");if(tap)tap.remove();
  const f=document.createElement("iframe");f.className="embed";f.allow="autoplay; encrypted-media; fullscreen; picture-in-picture";
  // player/v1 = clean full-bleed vertical player (no "related videos"/watch-now).
  f.src=`https://www.tiktok.com/player/v1/${v.id}?autoplay=1&loop=1&controls=1&music_info=0&description=0&rel=0&native_context_menu=0&closed_caption=0`;
  el.appendChild(f);
  el._t0=Date.now();
  if(el===activeEl)pushAudio(el);
}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

function finish(el,ended){
  if(el._reported)return;el._reported=true;
  if(el._t0)el._watch+=(Date.now()-el._t0)/1000;el._t0=null;
  report(el._v,Math.round(el._watch),ended);
  if(ended)maybeQuiz(el._v);
}
function maybeQuiz(v){
  if(!state.quizEnabled)return;
  if(Object.keys(state.watched).length%5!==0)return;
  const q=QUIZ[v.topic.toLowerCase()];if(!q)return;
  quizState={q};render();
}

let activeEl=null;
function observe(root){
  const obs=new IntersectionObserver(es=>{
    es.forEach(e=>{
      if(e.isIntersecting&&e.intersectionRatio>0.6){
        if(activeEl&&activeEl!==e.target){silence(activeEl);finish(activeEl,false)}
        activeEl=e.target;activeEl._reported=false;activeEl._watch=0;activeEl._t0=null;
        mount(activeEl,activeEl._v); // auto-load the video that's in view
        pushAudio(activeEl);        // unmute it if sound is enabled
      }
    });
  },{root,threshold:[0.6]});
  root.querySelectorAll(".slide").forEach(s=>obs.observe(s));
}

function emptyState(){
  const d=document.createElement("div");d.className="center";
  const anyData=Object.keys(FEED).length>0;
  d.innerHTML=anyData
    ?`<h2>You're all caught up!</h2><p>No unwatched videos left for your active interests. Add or re-enable a topic.</p>`
    :`<h2>No videos loaded</h2><p>feed.json didn't load. The full app scrapes live; this static site uses a pre-baked feed.</p>`;
  const b=document.createElement("button");b.className="btn";b.textContent="Open settings";
  b.onclick=()=>document.querySelector(".sheet").classList.add("open");
  d.appendChild(b);return d;
}

/* ---------- settings ---------- */
function settingsSheet(){
  const sh=document.createElement("div");sh.className="sheet";
  const p=document.createElement("div");p.className="page";
  const back=document.createElement("button");back.className="muted";back.style.cssText="background:none;border:none;margin-bottom:6px";back.textContent="← Back to feed";
  back.onclick=()=>{sh.classList.remove("open");render()};p.appendChild(back);
  const h=document.createElement("h1");h.textContent="Settings";p.appendChild(h);

  const s1=sec("Your interests");
  state.interests.forEach(it=>{
    const r=document.createElement("div");r.className="row";
    const n=videosFor(it.name).length;
    r.innerHTML=`<div><div>${it.name}</div><small>${n} video${n===1?"":"s"} loaded</small></div>`;
    const t=document.createElement("button");t.className="toggle"+(it.active?" on":"");
    t.onclick=()=>{it.active=!it.active;save();refreshSheet(sh)};
    r.appendChild(t);s1.appendChild(r);
  });
  const add=document.createElement("div");add.className="inline";add.innerHTML=`<input placeholder="Add a topic…">`;
  const ab=document.createElement("button");ab.className="btn sec";ab.textContent="Add";
  const addFn=()=>{const val=add.querySelector("input").value.trim().toLowerCase();if(val&&!state.interests.find(i=>i.name===val)){state.interests.push({name:val,active:true,priority:1});save();refreshSheet(sh)}};
  ab.onclick=addFn;add.querySelector("input").onkeydown=e=>{if(e.key==="Enter")addFn()};
  add.appendChild(ab);s1.appendChild(add);
  const note=document.createElement("p");note.className="muted";note.style.marginTop="8px";
  note.textContent="New topics need the scraper (run scripts/build_feed.py + redeploy) to load videos here.";
  s1.appendChild(note);
  p.appendChild(s1);

  const sug=Object.entries(state.tagCounts||{}).filter(([k,c])=>c>=2&&!state.interests.find(i=>i.name===k)).sort((a,b)=>b[1]-a[1]).slice(0,6);
  if(sug.length){
    const s2=sec("Suggested for you");
    const nt=document.createElement("p");nt.className="muted";nt.style.margin="-4px 0 8px";nt.textContent="Tags you watch a lot but haven't added.";s2.appendChild(nt);
    const chips=document.createElement("div");chips.className="chips";
    sug.forEach(([k,c])=>{const ch=document.createElement("button");ch.className="chip";ch.textContent="+ "+k+" ("+c+")";ch.onclick=()=>{state.interests.push({name:k,active:true,priority:1});save();refreshSheet(sh)};chips.appendChild(ch)});
    s2.appendChild(chips);p.appendChild(s2);
  }

  const s3=sec("Retention quiz");
  const qr=document.createElement("div");qr.className="row";
  qr.innerHTML=`<div><div>Quiz mode</div><small>Pauses to quiz you. Off by default.</small></div>`;
  const qt=document.createElement("button");qt.className="toggle"+(state.quizEnabled?" on":"");
  qt.onclick=()=>{state.quizEnabled=!state.quizEnabled;save();qt.classList.toggle("on")};
  qr.appendChild(qt);s3.appendChild(qr);
  const rk=document.createElement("p");rk.className="muted";rk.textContent="Rank "+state.rank+" · "+tier(state.rank);s3.appendChild(rk);
  p.appendChild(s3);

  const foot=document.createElement("p");foot.className="muted";foot.style.marginTop="24px";
  foot.innerHTML='Real TikToks scraped per interest. Full app (live scraper + YouTube fallback + Gemini quiz) in the <a href="https://github.com/robvanderouderaa/learnfeed">repo</a>.';
  p.appendChild(foot);
  sh.appendChild(p);return sh;
}
function refreshSheet(oldSh){const open=oldSh.classList.contains("open");render();if(open)document.querySelector(".sheet").classList.add("open")}
function sec(t){const s=document.createElement("div");s.className="sec";const h=document.createElement("h3");h.textContent=t;s.appendChild(h);return s}

/* ---------- quiz ---------- */
function quizModal(){
  const w=document.createElement("div");w.className="quizwrap";
  const c=document.createElement("div");c.className="quiz";
  c.innerHTML=`<div class="muted" style="margin-bottom:8px">Quick check</div><h3>${esc(quizState.q.q)}</h3>`;
  let chosen=null;
  quizState.q.a.forEach((choice,i)=>{
    const b=document.createElement("button");b.className="qc";b.textContent=choice;
    b.onclick=()=>{if(chosen!=null)return;chosen=i;const correct=i===quizState.q.c;state.rank+=correct?15:-15;save();
      [...c.querySelectorAll(".qc")].forEach((el,j)=>{if(j===quizState.q.c)el.classList.add("correct");else if(j===i)el.classList.add("wrong")});
      const res=document.createElement("div");res.style.marginTop="14px";
      res.innerHTML=`<p style="margin:0 0 12px">${correct?"✅ Correct! +15":"❌ Not quite. −15"} · Rank ${state.rank} (${tier(state.rank)})</p>`;
      const k=document.createElement("button");k.className="btn";k.textContent="Keep watching";k.onclick=()=>{quizState=null;render()};
      res.appendChild(k);c.appendChild(res);};
    c.appendChild(b);
  });
  w.appendChild(c);return w;
}

/* ---------- boot ---------- */
fetch("feed.json?v="+Date.now()).then(r=>r.json()).then(data=>{
  FEED=data.topics||{};
  ALL=Object.values(FEED).flat();
  // add any scraped topics the user doesn't have yet as inactive-free defaults
  render();
}).catch(()=>{FEED={};render()});
</script>
</body>
</html>
